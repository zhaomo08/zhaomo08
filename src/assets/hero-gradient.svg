<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 275">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="150" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#091a2e"/>
      <stop offset="0.45" stop-color="#0a3320"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="300" y1="0" x2="0" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#0ea5e9" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave1g" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="wave2g" x1="300" y1="0" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="25%" r="55%" gradientUnits="userSpaceOnUse"
      fx="75%" fy="25%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep base -->
  <rect width="300" height="275" fill="url(#bg)"/>
  <!-- Ambient glow from top-right -->
  <rect width="300" height="275" fill="url(#glow)"/>
  <!-- Shimmer overlay -->
  <rect width="300" height="275" fill="url(#shimmer)"/>

  <!-- Subtle dot grid texture -->
  <g fill="#4ade80" opacity="0.055">
    <circle cx="24" cy="24" r="1.4"/><circle cx="66" cy="24" r="1.4"/><circle cx="108" cy="24" r="1.4"/>
    <circle cx="150" cy="24" r="1.4"/><circle cx="192" cy="24" r="1.4"/><circle cx="234" cy="24" r="1.4"/>
    <circle cx="276" cy="24" r="1.4"/>
    <circle cx="24" cy="66" r="1.4"/><circle cx="66" cy="66" r="1.4"/><circle cx="108" cy="66" r="1.4"/>
    <circle cx="150" cy="66" r="1.4"/><circle cx="192" cy="66" r="1.4"/><circle cx="234" cy="66" r="1.4"/>
    <circle cx="276" cy="66" r="1.4"/>
    <circle cx="24" cy="108" r="1.4"/><circle cx="66" cy="108" r="1.4"/><circle cx="108" cy="108" r="1.4"/>
    <circle cx="150" cy="108" r="1.4"/><circle cx="192" cy="108" r="1.4"/><circle cx="234" cy="108" r="1.4"/>
    <circle cx="276" cy="108" r="1.4"/>
  </g>

  <!-- Accent divider line -->
  <line x1="20" y1="152" x2="280" y2="152" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- Wave layers -->
  <path fill="url(#wave1g)" d="M0,175 C55,152 115,198 175,168 C225,142 270,172 300,162 V275 H0Z"/>
  <path fill="url(#wave2g)" d="M0,205 C70,186 145,228 215,200 C258,184 282,207 300,202 V275 H0Z"/>
</svg>