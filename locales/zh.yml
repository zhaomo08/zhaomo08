about:
  content: >
    # 关于 IT-Tools

    本站 fork 自 [CorentinTh/it-tools](https://github.com/CorentinTh/it-tools)，在保留全部原有工具的基础上，新增了一套专为 AI / LLM 工作流设计的工具套件。

    ## AI 工具

    - **LLM Token & Cost Calculator** — 本地估算 Prompt Token 数、缓存节省与调用成本
    - **KV Cache Calculator** — 估算 Transformer KV Cache 显存占用与前缀缓存收益
    - **LLM Context Planner** — 按组件规划上下文窗口（系统提示、RAG、历史、输出预留）
    - **Prompt Variable Extractor** — 从模板中提取双花括号占位符并生成 JSON 样例
    - **Prompt Template Renderer** — 用 JSON 变量渲染 Prompt 模板，高亮未解析占位符
    - **JSONL Chat Builder** — 多行 Prompt 一键转为聊天补全 API 的 JSONL 批量请求
    - **JSON Output Key Checker** — 校验模型 JSON 输出是否满足必填字段

    ## 技术栈

    基于 Vue.js（Vue 3）、Naive UI 和 Vite 构建，由 Vercel 托管持续部署。源码在 [GitHub](https://github.com/zhaomo08/it-tools)。

    ## 发现了 Bug？缺少工具？

    欢迎在 [GitHub Issues](https://github.com/zhaomo08/it-tools/issues/new/choose) 中提交反馈。

    ## 致谢

    原项目由 [Corentin Thomasset](https://corentin.tech) 创建，采用 GPL-3.0 协议开源。

